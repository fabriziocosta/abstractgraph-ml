name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install external dependencies
        run: python -m pip install --upgrade pip numpy scikit-learn
      - name: Install package
        run: python -m pip install -e . --no-deps
      - name: Compile package
        run: python -m py_compile src/abstractgraph_ml/*.py
      - name: Optional local sibling smoke
        run: |
          if [ -d ../abstractgraph ]; then
            python -m pip install -e ../abstractgraph --no-deps
            python scripts/smoke_test.py
          else
            echo "Skipping import smoke: abstractgraph sibling repo not present."
          fi
